<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Géo Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-mode="game" data-theme="sombre">
  <div id="app">

    <header>
      <h1>Géo Quiz</h1>
      <div id="stats">
        <span id="lives">♥ ♥ ♥</span>
        <span id="score">0 pts</span>
      </div>
    </header>

    <div id="toolbar">
      <div id="mode-btns">
        <button id="btn-game"  class="mode-btn active">Mode Jeu</button>
        <button id="btn-learn" class="mode-btn">Mode Apprentissage</button>
      </div>
      <select id="level-select">
        <option value="monde">Monde entier</option>
        <option value="Europe">Europe</option>
        <option value="UE">Union Européenne</option>
        <option value="Afrique">Afrique</option>
        <option value="Asie">Asie</option>
        <option value="Amérique">Amérique</option>
        <option value="Océanie">Océanie</option>
      </select>
      <button id="start-btn">Démarrer</button>
      <button id="timer-btn" class="active" title="Désactiver le chrono">⏱</button>
      <button id="settings-btn" title="Paramètres">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div id="info-panel">
      <p id="question">Choisissez un niveau et cliquez sur Démarrer</p>
      <p id="message"></p>
    </div>

    <div id="main-content">

      <div id="list-panel">
        <table id="country-table">
          <thead>
            <tr>
              <th class="col-num">#</th>
              <th>
                Nom
                <span class="sort-btns">
                  <button class="sort-btn" data-col="nom" data-dir="asc">▲</button>
                  <button class="sort-btn" data-col="nom" data-dir="desc">▼</button>
                </span>
              </th>
              <th>
                Population
                <span class="sort-btns">
                  <button class="sort-btn" data-col="population" data-dir="asc">▲</button>
                  <button class="sort-btn" data-col="population" data-dir="desc">▼</button>
                </span>
              </th>
              <th>
                Superficie
                <span class="sort-btns">
                  <button class="sort-btn" data-col="superficie" data-dir="asc">▲</button>
                  <button class="sort-btn" data-col="superficie" data-dir="desc">▼</button>
                </span>
              </th>
            </tr>
          </thead>
          <tbody id="list-body"></tbody>
        </table>
      </div>

      <div id="timer-gauge"><div id="timer-fill"></div></div>
      <div id="map-container"></div>

    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div id="settings-header">
        <h2>Paramètres</h2>
        <button id="settings-close">✕</button>
      </div>
      <section>
        <h3>Thème</h3>
        <div class="theme-grid">

          <div class="theme-card" data-theme="sombre">
            <div class="theme-preview">
              <div class="preview-ocean"></div>
              <div class="preview-land"></div>
            </div>
            <span>Sombre</span>
          </div>

          <div class="theme-card" data-theme="colore">
            <div class="theme-preview">
              <div class="preview-ocean"></div>
              <div class="preview-land"></div>
            </div>
            <span>Coloré</span>
          </div>

<div class="theme-card" data-theme="tresor">
            <div class="theme-preview">
              <div class="preview-ocean"></div>
              <div class="preview-land"></div>
            </div>
            <span>Carte au trésor</span>
          </div>

          <div class="theme-card" data-theme="multi">
            <div class="theme-preview">
              <div class="preview-ocean"></div>
              <div class="preview-land"></div>
            </div>
            <span>Multicolore</span>
          </div>

        </div>
      </section>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
